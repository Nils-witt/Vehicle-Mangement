services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kfz
      POSTGRES_PASSWORD: kfz
      POSTGRES_DB: kfz_verwaltung
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kfz -d kfz_verwaltung"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-off: `docker compose run --rm migrate` applies pending migrations.
  # Uses the `builder` stage since it still has the full Prisma CLI, unlike
  # the lean runtime image.
  migrate:
    build:
      context: .
      target: builder
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://kfz:kfz@postgres:5432/kfz_verwaltung?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://kfz:kfz@postgres:5432/kfz_verwaltung?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
