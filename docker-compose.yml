services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kfz
      POSTGRES_PASSWORD: kfz
      POSTGRES_DB: kfz_verwaltung
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kfz -d kfz_verwaltung"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Fake SMTP server for local development. Web UI at http://localhost:8025
  # shows every email the app sends (e.g. verification links) without
  # needing a real mailbox or SMTP provider.
  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  # One-off: `docker compose run --rm migrate` applies pending migrations.
  # Uses the `builder` stage since it still has the full Prisma CLI, unlike
  # the lean runtime image.
  migrate:
    build:
      context: .
      target: builder
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://kfz:kfz@postgres:5432/kfz_verwaltung?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://kfz:kfz@postgres:5432/kfz_verwaltung?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@kfz-verwaltung.local}
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started

volumes:
  postgres-data:
